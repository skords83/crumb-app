services:
  db:
    image: postgres:15-alpine
    container_name: crumb-db
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - crumb_db:/var/lib/postgresql/data
    networks:
      - crumb-internal

  api:
    image: ghcr.io/skords83/crumb-app/api:latest
    container_name: crumb-api
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NTFY_URL: ${NTFY_URL}
      NTFY_TOPIC: ${NTFY_TOPIC}
      NTFY_TOKEN: ${NTFY_TOKEN}
      NTFY_VORLAUF: ${NTFY_VORLAUF}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    depends_on:
      - db
    volumes:
      - crumb_uploads:/usr/src/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crumb-api.rule=Host(`crumb.skords.de`) && PathPrefix(`/api`)"
      - "traefik.http.routers.crumb-api.entrypoints=websecure"
      - "traefik.http.routers.crumb-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.crumb-api.priority=10"
      - "traefik.http.services.crumb-api.loadbalancer.server.port=5000"
      - "traefik.http.routers.crumb-uploads.rule=Host(`crumb.skords.de`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.crumb-uploads.entrypoints=websecure"
      - "traefik.http.routers.crumb-uploads.tls.certresolver=letsencrypt"
      - "traefik.http.routers.crumb-uploads.priority=10"
      - "traefik.http.routers.crumb-uploads.service=crumb-api"
    networks:
      - proxy
      - crumb-internal

  ui:
    image: ghcr.io/skords83/crumb-app/ui:latest
    container_name: crumb-ui
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crumb-ui.rule=Host(`crumb.skords.de`)"
      - "traefik.http.routers.crumb-ui.entrypoints=websecure"
      - "traefik.http.routers.crumb-ui.tls.certresolver=letsencrypt"
      - "traefik.http.routers.crumb-ui.priority=1"
      - "traefik.http.services.crumb-ui.loadbalancer.server.port=3000"
    networks:
      - proxy
      - crumb-internal

volumes:
  crumb_db:
  crumb_uploads:

networks:
  proxy:
    external: true
  crumb-internal:
    internal: true